# =============================================================================
# Dev Deployment Workflow — No AWS Credentials Required
# =============================================================================
#
# STRATEGY: Push to Feature Branch → Validate on Dev
#
# Triggers automatically when a developer pushes to any feature/fix/hotfix/chore
# branch. It builds the full stack and health-checks every service so the
# developer gets immediate feedback before opening a PR.
#
# Promotion to develop is MANUAL — the developer opens a PR on GitHub:
#   feature/my-work  →  (GitHub PR)  →  develop
#
# This workflow does NOT merge or push to develop automatically.
#
# Supported branch prefixes:
#   feature/*  — new features      (e.g. feature/add-retry-logic)
#   feat/*     — alternative prefix (e.g. feat/kafka-dedup)
#   fix/*      — bug fixes         (e.g. fix/null-pointer-consumer)
#   hotfix/*   — urgent fixes      (e.g. hotfix/missing-idempotency-key)
#   chore/*    — maintenance       (e.g. chore/bump-spring-boot)
#
# Pipeline:
#   1. build-backend      Build all 9 Maven modules (tests run in ci.yml)
#   2. build-frontends    Build both React apps
#   3. validate-dev-stack Build Docker images → start stack → health-check → tear down
#
# NO secrets required — safe to run without any AWS account.
# =============================================================================

name: Deploy to Dev

on:
  push:
    branches:
      - 'feature/**'      # Feature branches
      - 'feat/**'         # Alternative feature prefix
      - 'fix/**'          # Bug fix branches
      - 'hotfix/**'       # Urgent production fixes
      - 'chore/**'        # Maintenance / dependency updates
    # develop is intentionally excluded — promotion to develop is manual via PR
  workflow_dispatch:      # Allow manual trigger from the GitHub Actions UI

# ---------------------------------------------------------------------------
# Concurrency: one active run per branch.
#   - feature/foo and feature/bar run in PARALLEL
#   - A new push to feature/foo cancels the in-progress run for feature/foo
# ---------------------------------------------------------------------------
concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — no AWS OIDC token needed
permissions:
  contents: read

jobs:

  # ===========================================================================
  # Job 1: Build Backend (Maven)
  # ===========================================================================
  build-backend:
    name: Build Backend (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all services with Maven
        run: mvn clean package -DskipTests -B
        # -DskipTests: tests run in ci.yml on every PR — no need to re-run here
        # -B: batch mode (non-interactive, better CI output)

      - name: Upload compiled JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars-${{ github.run_id }}
          path: '**/target/*.jar'
          retention-days: 1

  # ===========================================================================
  # Job 2: Build Frontend Apps (React)
  # ===========================================================================
  build-frontends:
    name: Build Frontends (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: producer-ui/package-lock.json

      - name: Build Producer UI
        working-directory: producer-ui
        run: npm ci && npm run build
        env:
          CI: true

      - name: Build Monitoring UI
        working-directory: monitoring-ui
        run: npm ci && npm run build
        env:
          CI: true

  # ===========================================================================
  # Job 3: Build Docker Images and Validate Dev Stack
  # ===========================================================================
  # Builds all Docker images using docker-compose-dev.yml (SPRING_PROFILES_ACTIVE=dev),
  # starts the full stack, verifies every service's /actuator/health endpoint,
  # then tears everything down. No ECR push. No AWS credentials.
  # ===========================================================================
  validate-dev-stack:
    name: Validate Dev Stack (docker-compose)
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontends

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download compiled JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars-${{ github.run_id }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images (dev profile, no push)
        run: docker compose -f docker-compose-dev.yml build
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Start dev stack
        run: |
          docker compose -f docker-compose-dev.yml up -d
          echo "Waiting 60s for services to initialise..."
          sleep 60

      - name: Health check all backend services
        run: |
          check_health() {
            local name=$1
            local url=$2
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "✓  $name — healthy (HTTP $status)"
            else
              echo "✗  $name — NOT healthy (HTTP $status)"
              return 1
            fi
          }

          check_health "bff-service"              http://localhost:8080/actuator/health
          check_health "consumer-service"         http://localhost:8081/actuator/health
          check_health "loader-service"           http://localhost:8082/actuator/health
          check_health "item-service"             http://localhost:8083/actuator/health
          check_health "trade-item-service"       http://localhost:8084/actuator/health
          check_health "supplier-supply-service"  http://localhost:8085/actuator/health
          check_health "shipment-service"         http://localhost:8086/actuator/health
          check_health "producer-service"         http://localhost:8087/actuator/health
          check_health "osp-mock-api"             http://localhost:9000/api/health

      - name: Print service logs on failure
        if: failure()
        run: docker compose -f docker-compose-dev.yml logs --tail=50

      - name: Tear down dev stack
        if: always()
        run: docker compose -f docker-compose-dev.yml down -v

      - name: Dev deployment summary
        run: |
          echo "============================================="
          echo "  DEV STACK VALIDATION PASSED"
          echo "============================================="
          echo "Branch   : ${{ github.ref_name }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Profile  : dev"
          echo "AWS creds: NOT required"
          echo ""
          echo "Next step — promote to develop manually:"
          echo "  1. Open a PR on GitHub:"
          echo "     ${{ github.server_url }}/${{ github.repository }}/compare/develop...${{ github.ref_name }}"
          echo "  2. Get 1 approval + CI passing"
          echo "  3. Merge the PR into develop"
          echo "============================================="
