# =============================================================================
# shipment-service — DEV profile
# =============================================================================
# Activated by: SPRING_PROFILES_ACTIVE=dev
# Used by     : docker-compose-dev.yml, shared dev server
# AWS needed  : NO
# Monitoring  : Datadog and Dynatrace DISABLED
# Logging     : Plain text (human-readable) via logback-spring.xml
# =============================================================================

management:
  metrics:
    export:
      datadog:
        enabled: false
      dynatrace:
        enabled: false
    tags:
      environment: dev

logging:
  level:
    com.supplychain.shipment: DEBUG
    org.springframework.web: INFO
