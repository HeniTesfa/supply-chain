server:
  port: 8080

spring:
  application:
    name: bff-service

# Downstream service URLs - overridden by environment variables in Docker
services:
  producer-service:
    url: ${PRODUCER_SERVICE_URL:http://localhost:8087}
  consumer-service:
    url: ${CONSUMER_SERVICE_URL:http://localhost:8081}
  item-service:
    url: ${ITEM_SERVICE_URL:http://localhost:8083}
  trade-item-service:
    url: ${TRADE_ITEM_SERVICE_URL:http://localhost:8084}
  supplier-supply-service:
    url: ${SUPPLIER_SUPPLY_SERVICE_URL:http://localhost:8085}
  shipment-service:
    url: ${SHIPMENT_SERVICE_URL:http://localhost:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      # Datadog metrics export — enabled in staging/production via env vars
      datadog:
        api-key: ${DATADOG_API_KEY:}
        uri: ${DATADOG_URI:https://api.datadoghq.com}
        enabled: ${DATADOG_ENABLED:false}
        step: 60s
      # Dynatrace metrics export — enabled in staging/production via env vars
      dynatrace:
        uri: ${DYNATRACE_URI:}
        api-token: ${DYNATRACE_API_TOKEN:}
        enabled: ${DYNATRACE_ENABLED:false}
        v2:
          metric-key-prefix: supply_chain
    tags:
      service: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
      version: ${APP_VERSION:1.0.0}

logging:
  level:
    com.supplychain.bff: DEBUG
    org.springframework.web: INFO
